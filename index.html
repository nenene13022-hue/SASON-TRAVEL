<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SASON TRAVEL</title>
    <!-- חיבור לפונט היבו מגוגל -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        :root{--p:#00b4d8;--d:#03045e;--o:#0077b6;--w:#fff}
        html{scroll-behavior:smooth}
        body{font-family:'Heebo',sans-serif;direction:rtl;background:#020818;color:#fff;overflow-x:hidden}
        
        /* תפריט ניווט עליון */
        nav{display:flex;align-items:center;justify-content:space-between;padding:0 48px;height:78px;background:rgba(2,8,24,0.92);border-bottom:1px solid rgba(0,180,216,0.1);position:fixed;top:0;left:0;right:0;z-index:1000;backdrop-filter:blur(20px)}
        .nav-right{display:flex;align-items:center;gap:12px;}
        
        /* עיגול לוגו מסתובב */
        .lr{width:52px;height:52px;border-radius:50%;background:conic-gradient(from 0deg,#00b4d8,#0077b6,#03045e,#00b4d8);padding:3px;animation:spin 8s linear infinite;box-shadow:0 0 24px rgba(0,180,216,0.4);flex-shrink:0}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        .li{width:100%;height:100%;border-radius:50%;background:#020818;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .li img{width:44px;height:44px;object-fit:contain;border-radius:50%}
        
        .bn{font-size:18px;font-weight:800;letter-spacing:1px;}
        .bn span{color:var(--p)}
        
        /* קישורי ניווט */
        .nl{display:flex;gap:30px;list-style:none}
        .nl a{color:rgba(255,255,255,0.6);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s;cursor:pointer}
        .nl a:hover{color:var(--p)}
        
        /* כפתור צור קשר */
        .nwa{background:transparent;border:1px solid rgba(0,180,216,0.3);color:var(--p);padding:9px 20px;border-radius:3px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .3s;font-family:'Heebo',sans-serif}
        .nwa:hover{background:rgba(0,180,216,0.15);box-shadow: 0 0 15px rgba(0,180,216,0.3);}
        
        /* מסכים קטנים (טלפונים) */
        @media(max-width:700px){
            nav{padding:0 16px;}
            .nl{display:none} /* מסתיר את התפריט הרגיל - מומלץ בהמשך ליצור תפריט המבורגר */
            .bn{font-size: 15px;}
            .nwa{padding: 6px 12px; font-size: 11px;}
        }
        
        /* אזור ראשי - Hero */
        .hero{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,#020818 0%,#03045e 50%,#023e8a 100%);padding:78px 20px 20px 20px;text-align:center;}
        .gbg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,180,216,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.04) 1px,transparent 1px);background-size:60px 60px;animation:gm 25s linear infinite;z-index: 1;}
        @keyframes gm{from{background-position:0 0}to{background-position:60px 60px}}
        
        /* כדורי אור זוהרים ברקע */
        .orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;animation:of ease-in-out infinite;z-index: 2;}
        .o1{width:500px;height:500px;background:rgba(0,119,182,0.2);top:-100px;right:-100px;animation-duration:12s}
        .o2{width:400px;height:400px;background:rgba(0,180,216,0.12);bottom:-80px;left:-80px;animation-duration:15s;animation-delay:-5s}
        .o3{width:250px;height:250px;background:rgba(3,4,94,0.3);top:40%;left:45%;animation-duration:10s;animation-delay:-3s}
        
        @keyframes of{
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, -60px) scale(1.1); }
        }
        
        /* תוכן ה-Hero */
        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 800px;
            animation: fadeIn 1.5s ease-out;
        }
        .hero-content h1 {
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to left, #fff, var(--p));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-content p {
            font-size: 20px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 35px;
            font-weight: 300;
        }
        .hero-btn {
            display: inline-block;
            background: var(--p);
            color: var(--d);
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0,180,216,0.4);
        }
        .hero-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(0,180,216,0.6);
            background: #fff;
            color: var(--d);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width:700px){
            .hero-content h1 { font-size: 36px; }
            .hero-content p { font-size: 16px; }
        }
    </style>
</head>
<body>

    <!-- סרגל ניווט -->
    <nav>
        <div class="nav-right">
            <div class="lr">
                <div class="li">
                    <!-- כאן תבוא תמונת הלוגו הקטנה שלך במידה ויש -->
                    <img src="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 24 24' fill='%2300b4d8'><path d='M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L14 19v-5.5L21 16z'/></svg>" alt="Logo">
                </div>
            </div>
            <div class="bn">SASON <span>TRAVEL</span></div>
        </div>

        <ul class="nl">
            <li><a href="#">בית</a></li>
            <li><a href="#">יעדים</a></li>
            <li><a href="#">חבילות נופש</a></li>
            <li><a href="#">עלינו</a></li>
        </ul>

        <a href="tel:0500000000" class="nwa">
            <span>📞</span> צור קשר
        </a>
    </nav>

    <!-- אזור ראשי -->
    <section class="hero">
        <div class="gbg"></div>
        <div class="orb o1"></div>
        <div class="orb o2"></div>
        <div class="orb o3"></div>
        
        <div class="hero-content">
            <h1>המסע הבא שלך מתחיל כאן</h1>
            <p>חבילות טיסה בלעדיות, מלונות יוקרה וחוויות בלתי נשכחות ברחבי העולם במחירים המשתלמים ביותר.</p>
            <a href="#" class="hero-btn">לצפייה בדילים החמים</a>
        </div>
    </section>

</body>
</html>
